<!DOCTYPE html>
<html lang="ca">
<head>
<link rel="icon" type="image/png" href="image.png">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ePUB Personal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, serif;
    background: #1a1a1a;
    color: #e0d8cc;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #toolbar {
    background: #111;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid #333;
  }

  /* Alçada uniforme per a tots els botons de la barra */
  #toolbar button,
  #toolbar label {
    height: 30px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    padding: 0 12px;
    font-size: 0.85rem;
    font-family: sans-serif;
    border-radius: 4px;
    cursor: pointer;
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    white-space: nowrap;
  }
  #toolbar button:hover,
  #toolbar label:hover { color: #eee; border-color: #888; }

  #toolbar label {
    background: transparent;
    color: #aaa;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: sans-serif;
    border: 1px solid #444;
  }
  #toolbar label:hover { color: #eee; border-color: #888; }
  #file-input { display: none; }

  /* CORRECCIÓ TIPOGRAFIA XVI EPUB */
  #app-title {
    flex: 0 0 auto;
    font-size: 0.9rem;
    color: #777;
    font-family: sans-serif;
    margin-right: 10px;
  }

  #book-title {
    flex: 1;
    font-size: 0.9rem;
    color: #aaa;
    font-family: sans-serif;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #font-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: sans-serif;
    font-size: 0.85rem;
    color: #aaa;
  }
  #font-controls button {
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: sans-serif;
  }
  #font-controls button:hover { color: #eee; border-color: #888; }

  #theme-btn {
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 0.85rem;
  }
  #theme-btn:hover { color: #eee; border-color: #888; }

  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  #sidebar {
    width: 220px;
    min-width: 220px;
    background: #111;
    border-right: 1px solid #333;
    overflow-y: auto;
    display: none;
    flex-direction: column;
  }

  #sidebar.open { display: flex; }

  #sidebar h3 {
    padding: 12px 14px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #777;
    font-family: sans-serif;
    border-bottom: 1px solid #222;
  }

  #toc-list {
    list-style: none;
    padding: 6px 0;
  }

  #toc-list li a {
    display: block;
    padding: 7px 14px;
    color: #ccc;
    text-decoration: none;
    font-size: 0.82rem;
    font-family: sans-serif;
    line-height: 1.4;
    border-left: 3px solid transparent;
  }
  #toc-list li a:hover { background: #1e1e1e; color: #fff; }
  #toc-list li a.active { border-left-color: #c8a97e; color: #c8a97e; }

  #reader-area {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #page-container {
    height: 100%;
    column-fill: auto;
    column-gap: 0px;
    transition: transform 0.2s ease;
    will-change: transform;
  }

  #content {
    font-size: 1.1rem;
    line-height: 1.8;
    padding: 36px 52px;
  }

  #content h1, #content h2, #content h3 {
    margin: 1.5em 0 0.6em;
    line-height: 1.3;
    color: #f0e8dc;
  }
  #content p { margin-bottom: 0.9em; text-align: justify; }
  #content img { max-width: 100%; height: auto; margin: 1em auto; display: block; }
  #content a { color: #c8a97e; }

  /* Coberta: imatge a pantalla completa */
  #page-container.is-cover {
    display: flex;
    align-items: center;
    justify-content: center;
    column-width: unset !important;
  }
  #page-container.is-cover #content {
    padding: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #page-container.is-cover #content img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    margin: 0;
  }

  #nav-bar {
    background: #111;
    border-top: 1px solid #333;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  #nav-bar button {
    background: #333;
    border: none;
    color: #eee;
    padding: 7px 18px;
    border-radius: 4px;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 0.85rem;
  }
  #nav-bar button:hover { background: #555; }
  #nav-bar button:disabled { opacity: 0.3; cursor: default; }

  #chapter-info {
    font-family: sans-serif;
    font-size: 0.8rem;
    color: #777;
    text-align: center;
    line-height: 1.5;
  }

  #toc-toggle {
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 0.85rem;
  }
  #toc-toggle:hover { color: #eee; border-color: #888; }

  #welcome {
    text-align: center;
    margin-top: 80px;
    color: #555;
    font-family: sans-serif;
  }
  #welcome h2 { font-size: 1.2rem; margin-bottom: 10px; color: #666; }
  #welcome p { font-size: 0.9rem; }

  #search-toggle-btn {
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 0.85rem;
  }
  #search-toggle-btn:hover { color: #eee; border-color: #888; }
  body.light #search-toggle-btn { background: transparent; border-color: #bbb; color: #666; }
  body.light #search-toggle-btn:hover { color: #111; border-color: #666; }

  #fs-btn {
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 0.85rem;
  }
  #fs-btn:hover { color: #eee; border-color: #888; }
  body.light #fs-btn { background: transparent; border-color: #bbb; color: #666; }
  body.light #fs-btn:hover { color: #111; border-color: #666; }

  #tts-btn {
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 0.85rem;
    min-width: 80px;
  }
  #tts-btn:hover { color: #eee; border-color: #888; }
  #tts-btn.active { border-color: #c8a97e; color: #c8a97e; }
  body.light #tts-btn { background: transparent; border-color: #bbb; color: #666; }
  body.light #tts-btn:hover { color: #111; border-color: #666; }

  /* Ressaltat de paraula llegida */
  .tts-word {
    background: rgba(200, 169, 126, 0.45);
    border-radius: 2px;
  }

  /* Cercador */
  #search-bar {
    display: none;
    background: #111;
    border-bottom: 1px solid #333;
    padding: 8px 16px;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  #search-bar.open { display: flex; }

  #search-input {
    flex: 1;
    min-width: 180px;
    background: #222;
    border: 1px solid #444;
    color: #eee;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 0.9rem;
    font-family: sans-serif;
    outline: none;
  }
  #search-input:focus { border-color: #c8a97e; }

  #search-btn, #search-close {
    background: #444;
    border: none;
    color: #eee;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 0.85rem;
  }
  #search-btn:hover, #search-close:hover { background: #666; }

  #search-info {
    font-family: sans-serif;
    font-size: 0.8rem;
    color: #888;
    min-width: 100px;
  }

  #search-nav { display: flex; gap: 4px; }
  #search-nav button {
    background: #333;
    border: none;
    color: #eee;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  #search-nav button:hover { background: #555; }
  #search-nav button:disabled { opacity: 0.3; cursor: default; }

  mark.search-hit {
    background: #c8a97e;
    color: #111;
    border-radius: 2px;
    padding: 0 1px;
  }
  mark.search-hit.current {
    background: #e8c97e;
    outline: 2px solid #fff;
  }

  /* Tema clar cercador */
  body.light #search-bar { background: #e8e0d0; border-color: #ccc; }
  body.light #search-input { background: #fff; border-color: #bbb; color: #222; }
  body.light #search-btn, body.light #search-close { background: #ccc; color: #222; }
  body.light #search-nav button { background: #ccc; color: #222; }
  body.light #search-info { color: #666; }

  /* Tema clar */
  body.light { background: #f5f0e8; color: #222; }
  body.light #toolbar,
  body.light #nav-bar,
  body.light #sidebar { background: #e8e0d0; border-color: #ccc; }
  body.light #sidebar h3 { color: #888; border-color: #ddd; }
  body.light #toc-list li a { color: #444; }
  body.light #toc-list li a:hover { background: #ddd8cc; color: #111; }
  body.light #content h1,
  body.light #content h2,
  body.light #content h3 { color: #111; }
  body.light #toolbar label,
  body.light #font-controls button,
  body.light #theme-btn,
  body.light #toc-toggle,
  body.light #nav-bar button { background: transparent; border-color: #bbb; color: #666; }
  body.light #toolbar label:hover,
  body.light #font-controls button:hover,
  body.light #theme-btn:hover,
  body.light #toc-toggle:hover,
  body.light #nav-bar button:hover { color: #111; border-color: #666; }
  body.light #book-title,
  body.light #chapter-info,
  body.light #font-controls { color: #666; }
</style>
</head>
<body>

<div id="toolbar">
  <span id="app-title">XVI ePUB</span>  
  <button id="toc-toggle" onclick="toggleSidebar()">☰ Índex</button>
  <label for="file-input">Obre ePUB</label>
  <input type="file" id="file-input" accept=".epub">
  <span id="book-title">Cap llibre carregat</span>
  <div id="font-controls">
    <button onclick="changeFont(-1)">A−</button>
    <button onclick="changeFont(1)">A+</button>
  </div>
  <button id="theme-btn" onclick="toggleTheme()">☀</button>
  <button id="search-toggle-btn" onclick="toggleSearch()">Cerca</button>
  <button id="fs-btn" onclick="toggleFullscreen()">⛶ Pantalla completa</button>
  <button id="tts-btn" onclick="toggleTTS()">▶ Llegir</button>
</div>
